<div class="container">
    <div class="form-section" id="order-form">
        <div class="form-grid">
            <div>
                <h3 style="font-size: 2rem; font-weight:800;">📩 Оставь заявку</h3>
                <p style="margin: 15px 0 20px;">Менеджер подберет ноутбук под ваш бюджет и задачи за 4 минуты.</p>
                <div style="display: flex; flex-direction: column; gap: 14px;">
                    <div class="contact-line"><i class="fas fa-phone-alt"></i> +7 (904) 913-91-57</div>
                    <div class="contact-line"><i class="fab fa-telegram"></i> @novaservicenn</div>
                    <div class="contact-line"><i class="fas fa-map-marker-alt"></i> г. Нижний Новгород, улица Максима Горького, 148</div>
                </div>
            </div>
            <form id="rentForm">
                <div class="form-fields">
                    <input type="text" name="Имя" id="userName" placeholder="Как к вам обращаться?" required>
                    <input type="tel" name="Телефон" id="userPhone" placeholder="+7 (___) ___-__-__" required>
                    
                    <select name="Модель" id="laptopSelect" required>
                        <option value="">Выберите ноутбук</option>
                        <option value="office" data-price="350">Lenovo Celeron (350₽/сутки)</option>
                        <option value="office" data-price="350">HP Amd A9 (350₽/сутки)</option>
                        <option value="office" data-price="350">ASUS Pentium (350₽/сутки)</option>
                        <option value="office" data-price="350">Lenovo Pentium+R5 (350₽/сутки)</option>
                        <option value="gaming" data-price="530">DELL i5 GTX (530₽/сутки)</option>
                        <option value="gaming-pro" data-price="1000">i5 RTX 4050 (1000₽/сутки)</option>
                    </select>
                    
                    <input type="number" name="Срок" id="daysInput" placeholder="Количество дней" min="1" value="1" required>
                    
                    <div class="accessory-checkboxes">
                        <label><input type="checkbox" class="accessory-check" data-price="250" value="Монитор"> Монитор (+250₽/день)</label>
                        <label><input type="checkbox" class="accessory-check" data-price="100" value="Наушники"> Наушники (+100₽/день)</label>
                        <label><input type="checkbox" class="accessory-check" data-price="150" value="Клавиатура"> Клавиатура (+150₽/день)</label>
                    </div>

                    <div class="price-calculator" id="priceCalculator">
                        <div class="total-row"><span>Базовая цена:</span> <span id="basePrice">0 ₽</span></div>
                        <div class="total-row discount" id="discountRow" style="display:none;"><span>Скидка на доп. дни:</span> <span id="discountAmount">-0 ₽</span></div>
                        <div class="total-row"><span>Аксессуары:</span> <span id="accessoryTotal">0 ₽</span></div>
                        <div class="total-row final"><span>Итого:</span> <span id="finalPrice">0 ₽</span></div>
                    </div>

                    <textarea rows="2" name="Комментарий" id="userComment" placeholder="Пожелания / удобное время доставки"></textarea>
                    
                    <!-- ===== ГАЛОЧКА СОГЛАСИЯ ===== -->
                    <div class="agreement-checkbox">
                        <label>
                            <input type="checkbox" id="agreementCheck">
                            <span>Я согласен на <a href="#" target="_blank">обработку персональных данных</a></span>
                        </label>
                    </div>
                    
                    <button type="submit" class="submit-btn" id="submitBtn" disabled>Отправить заявку</button>
                </div>
            </form>
        </div>
    </div>
</div>
